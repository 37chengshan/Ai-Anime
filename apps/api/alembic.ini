# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 版本文件模板
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# 是否使用双引号包裹标识符
# quote_schema = false

# SQL 输出格式
# truncate_slug_length = 40

# 版本目录
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# 版本路径分隔符
# version_path_separator = :

# 输出编码
# output_encoding = utf-8

# 数据库 URL (从环境变量读取)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S